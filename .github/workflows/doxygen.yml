name: Build and Deploy Doxygen Docs

on:
  push:
    branches:
      - main
      - feature/**   # triggers on any feature branch

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Doxygen + Graphviz
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      # 3. Generate Doxygen documentation
      - name: Generate Doxygen docs
        run: doxygen Doxyfile

      # 4. Prevent Jekyll processing
      - name: Add .nojekyll
        run: touch docs/html/.nojekyll

      # 5. Deploy to GitHub Pages using PAT
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: docs/html          # Doxygen HTML folder
          github_token: ${{ secrets.TEST }}  # Use your PAT stored in secrets
          publish_branch: gh-pages        # Target branch
          force_orphan: true              # Overwrite branch completely
name: Build and Deploy Doxygen Docs

on:
  push:
    branches:
      - main
      - feature/**   # trigger on any feature branch

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install Doxygen + Graphviz
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      # 3. Generate Doxygen documentation
      - name: Generate Doxygen docs
        run: doxygen Doxyfile

      # 4. Add .nojekyll to prevent GitHub Pages from processing HTML
      - name: Prevent Jekyll processing
        run: touch docs/html/.nojekyll

      # 5. Deploy to GitHub Pages using a PAT
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # Folder where Doxygen outputs HTML
          publish_dir: docs/html
          # Use your PAT stored as a secret (e.g., GH_PAT)
          github_token: ${{ secrets.GH_PAT }}
          # Target branch for GitHub Pages
          publish_branch: gh-pages
          # Overwrite gh-pages branch completely
          force_orphan: true